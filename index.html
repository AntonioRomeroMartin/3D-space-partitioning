<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Space Partitioning Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
    }

    canvas {
      display: block;
    }

    #top-controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background-color: rgba(0, 0, 0, 0.7);
      color: #f2f2f2;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #top-controls label {
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    #top-controls select {
      margin-left: 8px;
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 3px 6px;
      border-radius: 4px;
    }

    #controls-overlay,
    #project-credit {
      position: absolute;
      bottom: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: monospace, sans-serif;
      z-index: 100;
      pointer-events: none;
    }

    #controls-overlay {
      left: 20px;
      font-size: 14px;
      line-height: 1.5;
    }

    #controls-overlay h2 {
      color: #ffcc00;
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #controls-overlay h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #4da6ff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #controls-overlay ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    #controls-overlay li {
      margin-bottom: 6px;
    }

    #controls-overlay b,
    #project-credit b {
      color: #ffcc00;
    }

    #project-credit {
      right: 20px;
      font-size: 12px;
      user-select: none;
    }

    #doc-link-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      padding: 6px 14px;
      border-radius: 4px;
      background: #222;
      color: #ffcc00;
      border: 1px solid #555;
      cursor: pointer;
      font-size: 14px;
    }

    #doc-link-btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <div id="top-controls">
    <label for="dataset">
      Dataset:
      <select id="dataset">
        <option value="/data/ufo.pcd" selected>UFO</option>
        <option value="/data/corridor_telin.pcd">Corridor Telin</option>
        <option value="/data/hasselt.pcd">Hasselt</option>
      </select>
    </label>

    <label for="show-axes">
      <input id="show-axes" type="checkbox" checked /> Show axes
    </label>

    <label for="show-cubes">
      <input id="show-cubes" type="checkbox" checked /> Show Solid Cubes
    </label>

    <label for="show-wireframe">
      <input id="show-wireframe" type="checkbox" checked /> Show Wireframe
    </label>

    <label for="algorithm">
      Algorithm:
      <select id="algorithm">
        <option value="octree" selected>Octree</option>
        <option value="kdtree">k-d Tree</option>
        <option value="bsp">BSP Tree</option>
      </select>
    </label>
  </div>

  <button id="doc-link-btn" onclick="window.open('/docs/index.html', '_blank')">Open Documentation</button>

  <div id="controls-overlay">
    <h2>Current Depth: <span id="depth-display">1</span></h2>
    <h3>Camera Controls</h3>
    <ul>
      <li><b>Left Click + Drag</b> : Orbit around scene</li>
      <li><b>Mouse Wheel</b> : Zoom in / out</li>
      <li><b>+ / -</b> : Change Tree Depth</li>
    </ul>
  </div>

  <div id="project-credit">
    <b>Created by</b> Antonio Romero Martín & Siebe Ternest
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
