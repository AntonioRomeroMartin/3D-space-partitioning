<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Space Partitioning Viewer</title>
</head>

<body>

  <label for="dataset" style="position: fixed; top: 12px; left: 12px; z-index: 10; color: #f2f2f2; font-family: sans-serif;">
    Dataset:
    <select id="dataset" style="margin-left: 6px;">
      <option value="/data/ufo.pcd" selected>UFO</option>
      <option value="/data/corridor_telin.pcd">Corridor Telin</option>
      <option value="/data/hasselt.pcd">Hasselt</option>
    </select>
  </label>

  <label for="show-axes" style="position: fixed; top: 48px; left: 12px; z-index: 10; color: #f2f2f2; font-family: sans-serif;">
    <input id="show-axes" type="checkbox" checked />
    Show axes
  </label>

<script type="module" src="/src/main.js"></script>

<style>
  #controls-overlay {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background-color: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 8px;
    font-family: monospace, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    z-index: 100;
    /* Crucial: prevents the overlay from blocking your mouse clicks/drags */
    pointer-events: none; 
  }

  #controls-overlay h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #4da6ff; /* A nice Three.js blue */
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #controls-overlay ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
  }

  #controls-overlay li {
    margin-bottom: 6px;
  }

  #controls-overlay b {
    color: #ffcc00; /* Highlights the keys */
  }
</style>

<div id="controls-overlay">
  <h3>Fly Controls (AZERTY)</h3>
  <ul>
    <li><b>Z / S</b> : Move Forward / Backward</li>
    <li><b>Q / D</b> : Move Left / Right</li>
    <li><b>R / F</b> : Move Up / Down</li>
    <li><b>A / E</b> : Roll Left / Right</li>
    <li><b>Arrows</b> : Pitch / Yaw (Turn Camera)</li>
    <li><b>Left Click + Drag</b> : Look Around</li>
  </ul>
</div>

</body>
</html>
